spring.application.name=spring-app-1
server.port=1111

# ===============================
# DATABASE CONNECTION
# ===============================
# Replace 'your_database_name' with your actual schema name
spring.datasource.url=jdbc:mysql://localhost:3306/classicmodels?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=!Mysqlazedesalom!#ab@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
# Specifies the dialect so Hibernate generates optimized SQL for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ddl-auto options:
# update: Updates the schema (safe for dev)
# create: Recreates the schema on every startup (data loss!)
# validate: Just checks if the schema matches (best for production)
# none: Does nothing
spring.jpa.hibernate.ddl-auto=validate

# Show SQL queries in the console (useful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# CONNECTION POOL (Optional but Recommended)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5